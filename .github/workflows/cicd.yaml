name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]   # tự động chạy khi push lên main hoặc master

jobs:
  ci-cd:
    runs-on: ubuntu-latest       # chạy trên máy ảo Ubuntu của GitHub (miễn phí)

    steps:
      # Bước 1: Lấy code từ GitHub về máy ảo
      - name: Checkout code
        uses: actions/checkout@v3

      # Bước 2: Cài Java 17 trên máy ảo
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Bước 3: Build code → ra file .jar (bỏ qua test cho nhanh)
      - name: Build jar with Maven
        run: mvn clean package -DskipTests

      # Bước 4: Đăng nhập vào Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}   # lấy từ GitHub Secrets
          password: ${{ secrets.DOCKER_PASSWORD }}   # lấy từ GitHub Secrets

      # Bước 5: Build Docker image và push lên Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/jwt-app:latest

      # Bước 6: Gọi Render để deploy image mới nhất
      - name: Deploy to Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}