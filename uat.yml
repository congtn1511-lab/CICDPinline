replicaCount: 1

image:
  repository: dockerhub_user/hsm-keygen
  tag: latest
  pullPolicy: Always

nameOverride: "hsm-keygen"
fullnameOverride: "hsm-keygen"

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "uat"
  - name: SERVER_PORT
    value: "8080"

# Mount LunaClient lib vào container
volumeMounts:
  - name: luna-client
    mountPath: /usr/lib/luna
    readOnly: true

volumes:
  - name: luna-client
    hostPath:
      path: /usr/lib/luna

livenessProbe:
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

route:
  enabled: true
  host: hsm-keygen-uat.openshift-url
  tls:
    termination: edge